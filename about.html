<!DOCTYPE html>
<html>
<body>
<script type="text/javascript">

// Lista över popup-fönster som huvudfönstret öppnat
const openedWindows = [];

// Rensa bort stängda fönster och räkna hur många som är öppna
function countOpenWindows() {
    for (let i = openedWindows.length - 1; i >= 0; i--) {
        if (openedWindows[i].closed) {
            openedWindows.splice(i, 1);
        }
    }
    return openedWindows.length;
}

// Öppna ett nytt popup-fönster
function openPopup() {
    const w = window.open("about.html", "_blank", "width=600,height=400");
    if (w) openedWindows.push(w);
}

// Lyssna på SPACE
while (true){
    const openCount = countOpenWindows();
    console.log("Öppna fönster:", openCount);

    if (openCount < 5) {
        openPopup();
    
    }
}

</script>

<h1>About-sidan</h1>
<p>Tryck SPACE för att hålla exakt 5 fönster öppna.</p>

</body>
</html>
