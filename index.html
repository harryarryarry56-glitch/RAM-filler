<!DOCTYPE html>
<html>
<body>
<script type="text/javascript">

// Nyckel i localStorage som håller koll på antal öppna popup-fönster
const KEY = "popupCount";

// Se till att popupCount finns
if (!localStorage.getItem(KEY)) {
    localStorage.setItem(KEY, "0");
}

// Är detta fönster ett popup-fönster?
const isPopup = window.opener !== null;

// Om detta är ett popup-fönster: öka räknaren
if (isPopup) {
    let count = parseInt(localStorage.getItem(KEY));
    localStorage.setItem(KEY, String(count + 1));
}

// När popup-fönstret stängs: minska räknaren
window.addEventListener("beforeunload", () => {
    if (isPopup) {
        let count = parseInt(localStorage.getItem(KEY));
        localStorage.setItem(KEY, String(Math.max(0, count - 1)));
    }
});

// Funktion för att öppna popup
function openPopup() {
    window.open("about.html", "_blank", "width=600,height=400");
}

// SPACE = kontrollera och öppna tills 5 popup-fönster finns
while (true) {
    let count = parseInt(localStorage.getItem(KEY));

    while (count < 5) {
        openPopup();
        count++;
        localStorage.setItem(KEY, String(count));
    }

    console.log("Totalt öppna popup-fönster:", count);
}

// Lyssna på ändringar från andra fönster
window.addEventListener("storage", (e) => {
    if (e.key === KEY) {
        console.log("Uppdaterad popup-count:", e.newValue);
    }
});

</script>

<h1>About-sidan</h1>
<p>Tryck SPACE för att hålla exakt 5 popup-fönster öppna totalt.</p>

</body>
</html>
